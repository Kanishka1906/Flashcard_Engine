<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashGenius — Viewer</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<style>
:root {
  --sky:#e8f4fd; --sky-mid:#cce7f8; --sky-deep:#a8d4f0;
  --blue:#5ba4cf; --blue-dk:#3a7fbf; --blue-ink:#1e4d78;
  --accent:#f0a04b; --green:#7ec8a0; --red:#e07575;
  --card-a:#4a8bc4; --card-b:#2e6aaa;
  --glass:rgba(255,255,255,0.78); --shadow:0 8px 32px rgba(58,127,191,0.13);
  --font:'Sora',sans-serif; --serif:'DM Serif Display',serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);color:var(--blue-ink);background:linear-gradient(145deg,#d6eeff 0%,#eaf6ff 42%,#f5fbff 72%,#dff0fb 100%);min-height:100vh;overflow-x:hidden}
.blob{position:fixed;border-radius:50%;filter:blur(70px);opacity:.3;pointer-events:none;animation:drift 14s ease-in-out infinite alternate}
.b1{width:340px;height:340px;background:#b3d9f7;top:-80px;left:-55px}
.b2{width:240px;height:240px;background:#cde8fd;bottom:-50px;right:-35px;animation-delay:-5s}
@keyframes drift{to{transform:translate(16px,14px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── Layout ── */
.shell{display:flex;height:100vh;position:relative;z-index:1;overflow:hidden}

/* ── Sidebar ── */
.sb{width:268px;flex-shrink:0;background:rgba(232,244,253,.94);backdrop-filter:blur(18px);border-right:1.5px solid rgba(168,212,240,.48);display:flex;flex-direction:column;transition:width .28s ease,opacity .28s;overflow:hidden}
.sb.off{width:0;opacity:0;pointer-events:none}
.sb-inner{width:268px;overflow-y:auto;flex:1;display:flex;flex-direction:column}
.sb-inner::-webkit-scrollbar{width:3px}
.sb-inner::-webkit-scrollbar-thumb{background:var(--sky-deep);border-radius:3px}

.sb-head{padding:14px 13px 10px;border-bottom:1.5px solid var(--sky-mid);flex-shrink:0}
.back-btn{display:flex;align-items:center;gap:6px;font-size:.76rem;font-weight:600;color:var(--blue-dk);cursor:pointer;background:none;border:1.5px solid var(--sky-deep);border-radius:8px;padding:6px 11px;margin-bottom:9px;transition:background .17s;width:100%}
.back-btn:hover{background:var(--sky-mid)}
.sb-title{font-family:var(--serif);font-size:.95rem;color:var(--blue-ink)}
.sb-sub{font-size:.68rem;color:#7da0bf;margin-top:2px}
.sb-search{display:block;width:calc(100% - 16px);margin:9px 8px 5px;padding:6px 10px;border-radius:7px;border:1.5px solid var(--sky-deep);font-family:var(--font);font-size:.76rem;background:rgba(255,255,255,.72);color:var(--blue-ink);outline:none}
.sb-search:focus{border-color:var(--blue)}

.tlist{padding:5px 7px 10px}
.grp-label{font-size:.6rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#9ab7cc;padding:9px 8px 4px;border-top:1px solid rgba(168,212,240,.38);margin-top:5px}
.grp-label:first-child{border-top:none;margin-top:0}

/* Topic button */
.tb{width:100%;display:flex;align-items:center;gap:6px;padding:7px 9px;border-radius:8px;border:none;background:none;cursor:pointer;font-family:var(--font);font-size:.79rem;font-weight:500;color:var(--blue-dk);text-align:left;transition:all .17s;margin-bottom:2px;line-height:1.3}
.tb:hover{background:rgba(91,164,207,.1)}
.tb.active{background:var(--blue-dk);color:#fff;font-weight:600}
.tb.has-cards{font-weight:600}
.tb.no-cards{opacity:.52}
.tb .tnum{font-size:.62rem;opacity:.45;min-width:17px;text-align:right;flex-shrink:0}
.tb.active .tnum{opacity:.6}
.tb .tlabel{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tb .tcnt{border-radius:100px;padding:1px 6px;font-size:.62rem;flex-shrink:0}
.tb.has-cards .tcnt{background:rgba(91,164,207,.18);color:var(--blue-dk)}
.tb.active .tcnt{background:rgba(255,255,255,.2);color:#fff}
.tb.no-cards .tcnt{display:none}
/* level indents */
.tb[data-lv="1"]{font-size:.82rem;font-weight:700;padding-left:9px}
.tb[data-lv="2"]{padding-left:18px}
.tb[data-lv="3"]{padding-left:29px;font-size:.74rem}
.tb[data-lv="4"]{padding-left:38px;font-size:.7rem}

/* ── Generate inline button (shown for ungenerated topics) ── */
.gen-inline{
  display:none; /* shown when topic has no cards */
  width:100%;margin-top:4px;padding:8px 12px;border-radius:9px;
  background:linear-gradient(135deg,var(--blue),var(--blue-dk));
  color:#fff;font-family:var(--font);font-size:.76rem;font-weight:700;
  border:none;cursor:pointer;transition:all .2s;
  align-items:center;justify-content:center;gap:6px;
}
.gen-inline.show{display:flex}
.gen-inline:hover{transform:translateY(-1px);box-shadow:0 4px 14px rgba(58,127,191,.3)}
.gen-inline:disabled{opacity:.45;cursor:not-allowed;transform:none}
.gen-inline .gsp{width:14px;height:14px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none}
.gen-inline.busy .gsp{display:block}
.gen-inline.busy .gtxt{display:none}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* Toolbar */
.toolbar{padding:10px 16px;display:flex;align-items:center;gap:8px;background:var(--glass);backdrop-filter:blur(12px);border-bottom:1.5px solid rgba(168,212,240,.38);flex-shrink:0;flex-wrap:wrap}
.icon-btn{width:32px;height:32px;border-radius:7px;border:1.5px solid var(--sky-deep);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--blue-dk);transition:background .17s;flex-shrink:0}
.icon-btn:hover{background:var(--sky-mid)}
.tb-title{font-family:var(--serif);font-size:.94rem;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.tb-meta{font-size:.7rem;color:#7da0bf;flex-shrink:0;white-space:nowrap}
.seg{display:flex;gap:2px;background:var(--sky-mid);border-radius:8px;padding:3px;flex-shrink:0}
.seg-btn{padding:5px 11px;border-radius:6px;border:none;cursor:pointer;font-family:var(--font);font-size:.74rem;font-weight:600;color:var(--blue-dk);background:none;transition:all .17s}
.seg-btn.active{background:#fff;box-shadow:0 2px 7px rgba(58,127,191,.14)}
.f-type{appearance:none;background:rgba(255,255,255,.74);border:1.5px solid var(--sky-deep);border-radius:7px;padding:5px 20px 5px 8px;font-family:var(--font);font-size:.73rem;color:var(--blue-dk);cursor:pointer;outline:none}

/* Stats */
.stats-bar{display:flex;gap:7px;padding:9px 16px 0;flex-wrap:wrap;flex-shrink:0}
.sc{display:flex;align-items:center;gap:4px;background:var(--glass);border:1.5px solid rgba(255,255,255,.88);border-radius:100px;padding:3px 10px;font-size:.7rem;font-weight:600;color:var(--blue-dk)}

/* Cards area */
.cards-area{flex:1;overflow-y:auto;padding:18px}
.cards-area::-webkit-scrollbar{width:5px}
.cards-area::-webkit-scrollbar-thumb{background:var(--sky-deep);border-radius:5px}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(305px,1fr));gap:17px}

/* ── Flashcard ── */
.fc{cursor:pointer;min-height:260px;animation:up .26s ease both}
.fc-fw,.fc-bw{width:100%}
.fc-bw{display:none}
.fc.flip .fc-fw{display:none}
.fc.flip .fc-bw{display:block}

.fc-f,.fc-b{border-radius:15px;padding:20px 22px 15px;width:100%;display:flex;flex-direction:column;min-height:260px}
.fc-f{background:var(--glass);border:1.5px solid rgba(255,255,255,.92);box-shadow:var(--shadow)}
.fc-b{background:linear-gradient(145deg,var(--card-a),var(--card-b));color:#fff;box-shadow:0 7px 26px rgba(28,60,110,.22)}

/* type borders */
.fc[data-t="DEFINITION"]    .fc-f{border-top:3px solid #5ba4cf}
.fc[data-t="CONCEPT"]       .fc-f{border-top:3px solid #7ec8a0}
.fc[data-t="FORMULA"]       .fc-f{border-top:3px solid #a57fcc}
.fc[data-t="APPLICATION"]   .fc-f{border-top:3px solid #f0a04b}
.fc[data-t="EXAMPLE"]       .fc-f{border-top:3px solid #64b8e0}
.fc[data-t="COMPARE"]       .fc-f{border-top:3px solid #e07fa0}
.fc[data-t="ACTIVE_RECALL"] .fc-f{border-top:3px solid #e0a04b}
.fc[data-t="ERROR_BASED"]   .fc-f{border-top:3px solid #e07575}

.fc-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 9px;border-radius:100px;font-size:.62rem;font-weight:700;letter-spacing:.05em;margin-bottom:10px;align-self:flex-start;background:rgba(0,0,0,.05);color:var(--blue-dk);flex-shrink:0}
.fc-b .fc-badge{background:rgba(255,255,255,.16);color:rgba(255,255,255,.85)}
.bdot{width:5px;height:5px;border-radius:50%;background:currentColor}

.fc-body{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.fc-q{font-size:.92rem;font-weight:600;line-height:1.56;color:var(--blue-ink)}
.fc-a{font-size:.86rem;line-height:1.68;color:rgba(255,255,255,.95);overflow-y:auto;flex:1}
.fc-a::-webkit-scrollbar{width:2px}
.fc-a::-webkit-scrollbar-thumb{background:rgba(255,255,255,.25);border-radius:2px}
.fc-hint{font-size:.7rem;color:#9ab7cc;font-style:italic;margin-top:7px}

.fc-foot{flex-shrink:0;margin-top:12px;padding-top:9px;border-top:1px solid rgba(168,212,240,.3);display:flex;align-items:center;justify-content:flex-end}
.fc-b .fc-foot{border-top-color:rgba(255,255,255,.12);flex-direction:column;gap:7px;align-items:stretch}
.flip-hint{font-size:.64rem;color:#aac5d8}
.fc-b .flip-hint{color:rgba(255,255,255,.35)}

/* SR buttons */
.sr-row{display:flex;gap:7px}
.sr-btn{flex:1;padding:8px 5px;border-radius:9px;border:1.5px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;font-family:var(--font);font-size:.75rem;font-weight:700;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap}
.sr-btn:hover{transform:translateY(-1px)}
.sr-btn.sa{border-color:rgba(224,117,117,.55);background:rgba(224,117,117,.2)}
.sr-btn.sa:hover{background:rgba(224,117,117,.35)}
.sr-btn.gi{border-color:rgba(126,200,160,.55);background:rgba(126,200,160,.2)}
.sr-btn.gi:hover{background:rgba(126,200,160,.35)}
.sr-done{font-size:.68rem;color:rgba(255,255,255,.5);text-align:center;padding:3px 0}

/* Empty state */
.empty{text-align:center;padding:55px 20px;color:#9ab7cc;grid-column:1/-1}
.empty h3{font-family:var(--serif);font-size:1.15rem;margin-bottom:7px;color:#7da0bf}
.empty p{font-size:.83rem;line-height:1.55}

/* ── Fullscreen ── */
.fs{display:none;position:fixed;inset:0;z-index:200;background:rgba(8,20,44,.9);backdrop-filter:blur(15px);flex-direction:column;align-items:center;justify-content:center;padding:18px 14px}
.fs.on{display:flex}
.fs-x{position:fixed;top:14px;right:14px;width:38px;height:38px;border-radius:9px;background:rgba(255,255,255,.1);border:1.5px solid rgba(255,255,255,.18);color:#fff;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:201;transition:background .17s}
.fs-x:hover{background:rgba(255,255,255,.2)}

.fs-wrap{width:100%;max-width:640px}
.fs-card{width:100%;perspective:1400px;cursor:pointer;user-select:none}
.fs-inner{width:100%;transform-style:preserve-3d;transition:transform .55s cubic-bezier(.4,0,.2,1);min-height:390px;position:relative}
@media(max-width:580px){.fs-inner{min-height:310px}}
.fs-card.fl .fs-inner{transform:rotateY(180deg)}
.fs-face{position:absolute;inset:0;border-radius:20px;backface-visibility:hidden;padding:30px 34px 22px;display:flex;flex-direction:column}
.fs-fr{background:rgba(255,255,255,.97);box-shadow:0 22px 72px rgba(14,46,100,.38)}
.fs-bk{background:linear-gradient(145deg,#4e8fc6,#2d68a8);color:#fff;transform:rotateY(180deg);box-shadow:0 22px 72px rgba(8,18,42,.55)}

.fs-card[data-t="DEFINITION"]    .fs-fr{border-top:4px solid #5ba4cf}
.fs-card[data-t="CONCEPT"]       .fs-fr{border-top:4px solid #7ec8a0}
.fs-card[data-t="FORMULA"]       .fs-fr{border-top:4px solid #a57fcc}
.fs-card[data-t="APPLICATION"]   .fs-fr{border-top:4px solid #f0a04b}
.fs-card[data-t="EXAMPLE"]       .fs-fr{border-top:4px solid #64b8e0}
.fs-card[data-t="COMPARE"]       .fs-fr{border-top:4px solid #e07fa0}
.fs-card[data-t="ACTIVE_RECALL"] .fs-fr{border-top:4px solid #e0a04b}
.fs-card[data-t="ERROR_BASED"]   .fs-fr{border-top:4px solid #e07575}

.fs-type{font-size:.68rem;font-weight:700;letter-spacing:.06em;opacity:.45;margin-bottom:14px;flex-shrink:0}
.fs-fr .fs-type{color:var(--blue-dk)}
.fs-bk .fs-type{color:rgba(255,255,255,.65)}
.fs-content{flex:1;overflow-y:auto;min-height:0}
.fs-content::-webkit-scrollbar{width:3px}
.fs-content::-webkit-scrollbar-thumb{background:rgba(255,255,255,.2);border-radius:3px}
.fs-q{font-family:var(--serif);font-size:clamp(1.1rem,2.3vw,1.42rem);line-height:1.44;color:var(--blue-ink)}
.fs-a{font-size:clamp(.88rem,1.5vw,1rem);line-height:1.7;color:rgba(255,255,255,.94)}
.fs-hint{font-size:.73rem;color:#9ab7cc;font-style:italic;margin-top:8px}
.fs-tap{font-size:.7rem;opacity:.32;margin-top:10px;text-align:center;flex-shrink:0}
.fs-fr .fs-tap{color:var(--blue-ink)}
.fs-bk .fs-tap{color:#fff}
.fs-foot{flex-shrink:0;margin-top:14px;padding-top:12px;border-top:1px solid rgba(255,255,255,.14);display:flex;flex-direction:column;gap:9px}
.fs-rtags{display:flex;flex-wrap:wrap;gap:4px}
.fs-rtag{font-size:.61rem;padding:2px 8px;border-radius:100px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.62);border:1px solid rgba(255,255,255,.18)}
.fs-sr{display:flex;gap:9px}
.fs-sr-btn{flex:1;padding:11px 7px;border-radius:11px;border:1.5px solid rgba(255,255,255,.2);background:rgba(255,255,255,.1);color:#fff;font-family:var(--font);font-size:.8rem;font-weight:700;cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:6px}
.fs-sr-btn:hover{transform:translateY(-2px)}
.fs-sr-btn.sa{border-color:rgba(224,117,117,.5);background:rgba(224,117,117,.2)}
.fs-sr-btn.sa:hover{background:rgba(224,117,117,.35)}
.fs-sr-btn.gi{border-color:rgba(126,200,160,.5);background:rgba(126,200,160,.2)}
.fs-sr-btn.gi:hover{background:rgba(126,200,160,.35)}
.fs-rated{text-align:center;color:rgba(255,255,255,.48);font-size:.72rem;padding:5px 0}

.fs-ctrl{display:flex;align-items:center;gap:11px;margin-top:13px;width:100%;max-width:640px}
.fs-btn{width:46px;height:46px;border-radius:11px;border:1.5px solid rgba(255,255,255,.18);background:rgba(255,255,255,.08);color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .17s}
.fs-btn:hover{background:rgba(255,255,255,.18);transform:scale(1.05)}
.fs-btn:disabled{opacity:.22;cursor:not-allowed;transform:none}
.fs-mid{flex:1;text-align:center}
.fs-ctr{font-family:var(--serif);font-size:1.15rem;color:#fff}
.fs-pb{height:3px;background:rgba(255,255,255,.12);border-radius:3px;margin-top:5px;overflow:hidden}
.fs-pf{height:100%;background:var(--blue);border-radius:3px;transition:width .28s ease}
.fs-concept{font-size:.64rem;color:rgba(255,255,255,.3);text-align:center;margin-top:5px}

/* Toast */
.toast{position:fixed;bottom:22px;right:22px;z-index:300;background:var(--blue-dk);color:#fff;padding:11px 17px;border-radius:10px;font-size:.82rem;font-weight:500;box-shadow:0 5px 18px rgba(30,77,120,.3);transform:translateY(40px);opacity:0;transition:all .26s;max-width:280px;pointer-events:none}
.toast.on{transform:translateY(0);opacity:1}
.toast.err{background:#c0392b}
</style>
</head>
<body>
<div class="blob b1"></div><div class="blob b2"></div>

<div class="shell">
  <!-- ── Sidebar ── -->
  <aside class="sb" id="sb">
    <div class="sb-inner">
      <div class="sb-head">
        <button class="back-btn" onclick="location.href='/'">← Dashboard</button>
        <div class="sb-title">All Sections</div>
        <div class="sb-sub" id="sb-sub"></div>
      </div>
      <input class="sb-search" id="sb-search" placeholder="🔍 Search…" oninput="filterSB(this.value)">

      <!-- Inline generate button — shown when a no-card topic is selected -->
      <button class="gen-inline" id="gen-inline" onclick="generateCurrent()">
        <div class="gsp"></div>
        <span class="gtxt" id="gen-inline-txt">✨ Generate for this topic</span>
      </button>

      <div class="tlist" id="tlist"></div>
    </div>
  </aside>

  <!-- ── Main ── -->
  <div class="main">
    <div class="toolbar">
      <button class="icon-btn" onclick="toggleSB()" title="Toggle sidebar">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>
      <div class="tb-title" id="tb-title">Select a section</div>
      <div class="tb-meta" id="tb-meta"></div>
      <select class="f-type" id="f-type" onchange="applyFilter()">
        <option value="">All types</option>
        <option value="DEFINITION">Definition</option>
        <option value="CONCEPT">Concept</option>
        <option value="FORMULA">Formula</option>
        <option value="APPLICATION">Application</option>
        <option value="EXAMPLE">Example</option>
        <option value="COMPARE">Compare</option>
        <option value="ACTIVE_RECALL">Active Recall</option>
        <option value="ERROR_BASED">Error Based</option>
      </select>
      <div class="seg">
        <button class="seg-btn active" id="btn-grid" onclick="setView('grid')">⊞ Grid</button>
        <button class="seg-btn" id="btn-fs" onclick="openFS()">⛶ Focus</button>
      </div>
    </div>

    <div class="stats-bar" id="stats-bar"></div>
    <div class="cards-area"><div class="cards-grid" id="croot"></div></div>
  </div>
</div>

<!-- ── Fullscreen ── -->
<div class="fs" id="fs">
  <button class="fs-x" onclick="closeFS()">✕</button>
  <div class="fs-wrap">
    <div class="fs-card" id="fs-card" onclick="flipFS()">
      <div class="fs-inner">
        <div class="fs-face fs-fr">
          <div class="fs-type" id="fst-f"></div>
          <div class="fs-content"><div class="fs-q" id="fsq"></div><div class="fs-hint" id="fshint"></div></div>
          <div class="fs-tap">Tap to reveal · Space</div>
        </div>
        <div class="fs-face fs-bk">
          <div class="fs-type" id="fst-b"></div>
          <div class="fs-content"><div class="fs-a" id="fsa"></div></div>
          <div class="fs-foot">
            <div class="fs-rtags" id="fs-rtags"></div>
            <div class="fs-sr" id="fs-sr">
              <button class="fs-sr-btn sa" onclick="rateFS(1,event)">🔁 Study Again</button>
              <button class="fs-sr-btn gi" onclick="rateFS(4,event)">✅ Got It</button>
            </div>
          </div>
          <div class="fs-tap">Tap to flip · ← →</div>
        </div>
      </div>
    </div>
    <div class="fs-concept" id="fs-cpt"></div>
  </div>
  <div class="fs-ctrl">
    <button class="fs-btn" id="fs-prev" onclick="navFS(-1)">←</button>
    <div class="fs-mid">
      <div class="fs-ctr" id="fs-ctr">1 / 0</div>
      <div class="fs-pb"><div class="fs-pf" id="fs-pf" style="width:0%"></div></div>
    </div>
    <button class="fs-btn" id="fs-next" onclick="navFS(1)">→</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'http://localhost:5050';

// ── State ──────────────────────────────────────────────────────────
let allCards   = {};     // topic → cards[]
let genTopics  = [];     // topics that have cards
let allTopics  = [];     // all PDF sections
let allHeads   = [];     // heading objects {text,level,page}
let cur        = null;   // current topic string
let curCards   = [];
let filtered   = [];
let fsIdx      = 0;
let fsFlipped  = false;
let sbOpen     = true;
let swipeX     = null;

// ── Boot ──────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  const rC = sessionStorage.getItem('flashcards');
  const rG = sessionStorage.getItem('genTopics');
  const rA = sessionStorage.getItem('allSections');
  const rH = sessionStorage.getItem('allHeadings');

  if (!rC || !rG) {
    document.getElementById('croot').innerHTML = `
      <div class="empty">
        <h3>No flashcards loaded</h3>
        <p>Session expired. Go back to the dashboard.</p>
        <div style="margin-top:18px">
          <button onclick="location.href='/'" style="padding:9px 22px;border-radius:9px;background:#3a7fbf;color:#fff;border:none;font-family:inherit;font-size:.88rem;font-weight:700;cursor:pointer">← Dashboard</button>
        </div>
      </div>`;
    document.getElementById('tb-title').textContent = 'No cards loaded';
    return;
  }

  try {
    allCards  = JSON.parse(rC);
    genTopics = JSON.parse(rG);
    allTopics = rA ? JSON.parse(rA) : genTopics;
    allHeads  = rH ? JSON.parse(rH) : [];
  } catch(e) {
    document.getElementById('croot').innerHTML =
      `<div class="empty"><h3>Parse error</h3><p>${e.message}</p></div>`;
    return;
  }

  buildSB(allTopics);
  if (genTopics.length) selectTopic(genTopics[0]);
  else if (allTopics.length) selectTopic(allTopics[0]);
});

// ── Sidebar ───────────────────────────────────────────────────────
function buildSB(list) {
  document.getElementById('sb-sub').textContent =
    `${allTopics.length} sections · ${genTopics.length} with cards`;
  renderSBList(list);
}

function renderSBList(list) {
  const genSet = new Set(genTopics);
  const el = document.getElementById('tlist');
  const with_ = list.filter(s => genSet.has(s));
  const without = list.filter(s => !genSet.has(s));
  let h = '';
  if (with_.length) {
    h += `<div class="grp-label">📚 Generated (${with_.length})</div>`;
    with_.forEach(t => { h += tbHTML(t, allTopics.indexOf(t), true); });
  }
  if (without.length) {
    h += `<div class="grp-label">📄 All Sections (${without.length})</div>`;
    without.forEach(t => { h += tbHTML(t, allTopics.indexOf(t), false); });
  }
  el.innerHTML = h;
}

function tbHTML(t, idx, hasCards) {
  const hd  = allHeads.find(h => h.text === t) || {};
  const lv  = Math.min(hd.level || 2, 4);
  const n   = hasCards ? (allCards[t]||[]).length : 0;
  const cls = `tb ${cur===t?'active':''} ${hasCards?'has-cards':'no-cards'}`;
  return `<button class="${cls}" data-lv="${lv}" data-topic="${H(t)}"
    onclick="selectTopic(${J(t)})" title="${H(t)}">
    <span class="tnum">${idx+1}</span>
    <span class="tlabel">${H(t)}</span>
    <span class="tcnt">${hasCards?n:''}</span>
  </button>`;
}

function filterSB(q) {
  renderSBList(q ? allTopics.filter(s=>s.toLowerCase().includes(q.toLowerCase())) : allTopics);
}

// ── Select topic ──────────────────────────────────────────────────
function selectTopic(t) {
  cur      = t;
  curCards = allCards[t] || [];

  // Update sidebar active state
  document.querySelectorAll('.tb').forEach(b => b.classList.toggle('active', b.dataset.topic===t));

  // Show/hide inline generate button
  const hasCards = new Set(genTopics).has(t);
  const ginl = document.getElementById('gen-inline');
  ginl.classList.toggle('show', !hasCards);
  if (!hasCards) document.getElementById('gen-inline-txt').textContent = `✨ Generate for "${t.length>28?t.slice(0,28)+'…':t}"`;

  document.getElementById('tb-title').textContent = t;
  document.getElementById('f-type').value = '';
  applyFilter();
}

// ── On-demand generation from sidebar ────────────────────────────
async function generateCurrent() {
  if (!cur) return;
  const btn = document.getElementById('gen-inline');
  btn.disabled = true; btn.classList.add('busy');
  toast(`Generating flashcards for "${cur}"…`);

  try {
    const res  = await fetch(`${API}/generate`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ topics: [cur] })
    });
    const data = await res.json();

    if (!res.ok || data.error) { toast(data.error||'Generation failed.', true); return; }

    const cards = (data.flashcards||{})[cur] || [];
    if (!cards.length) { toast('No cards generated — try again.', true); return; }

    // Merge into existing state
    allCards[cur] = cards;
    if (!genTopics.includes(cur)) genTopics.push(cur);

    // Persist updated state
    sessionStorage.setItem('flashcards', JSON.stringify(allCards));
    sessionStorage.setItem('genTopics',  JSON.stringify(genTopics));

    // Update UI
    renderSBList(allTopics);
    selectTopic(cur);   // re-select — now has cards
    toast(`✅ ${cards.length} cards generated!`);
  } catch(e) {
    toast('Network error.', true);
  } finally {
    btn.disabled = false; btn.classList.remove('busy');
  }
}

// ── Filter & render ───────────────────────────────────────────────
function applyFilter() {
  const type = document.getElementById('f-type').value;
  filtered = type ? curCards.filter(c=>c.type===type) : [...curCards];
  renderGrid(); renderStats();
  document.getElementById('tb-meta').textContent =
    filtered.length ? `${filtered.length} card${filtered.length!==1?'s':''}` : '';
}

function renderGrid() {
  const root = document.getElementById('croot');
  const genSet = new Set(genTopics);
  if (!curCards.length && !genSet.has(cur)) {
    root.innerHTML = `<div class="empty">
      <h3>No cards yet for this section</h3>
      <p>Click <strong>✨ Generate</strong> in the sidebar to create flashcards for this topic.</p>
    </div>`;
    return;
  }
  if (!filtered.length) {
    root.innerHTML = `<div class="empty"><h3>No cards match this filter</h3></div>`;
    return;
  }
  root.innerHTML = filtered.map((c,i) => cardHTML(c,i)).join('');
}

function cardHTML(c, i) {
  const delay = Math.min(i*.03, 0.48);
  const rel   = (c.related_to||[]).slice(0,3);
  const sj    = H(JSON.stringify(c));
  return `<div class="fc" data-t="${H(c.type||'CONCEPT')}" style="animation-delay:${delay}s">
    <div class="fc-fw"><div class="fc-f" onclick="flipCard(this)">
      <span class="fc-badge"><span class="bdot"></span>${H(c.type||'CONCEPT')}</span>
      <div class="fc-body"><div class="fc-q">${H(c.front||'')}</div>${c.hint?`<div class="fc-hint">💡 ${H(c.hint)}</div>`:''}</div>
      <div class="fc-foot"><span class="flip-hint">Click to flip →</span></div>
    </div></div>
    <div class="fc-bw"><div class="fc-b" onclick="flipCard(this)">
      <span class="fc-badge">${H(c.type||'CONCEPT')}</span>
      <div class="fc-body">
        <div class="fc-a">${fmt(c.back||'')}</div>
        ${rel.length?`<div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:7px">${rel.map(r=>`<span style="font-size:.6rem;padding:2px 7px;border-radius:100px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.65);border:1px solid rgba(255,255,255,.18)">↗ ${H(r)}</span>`).join('')}</div>`:''}
      </div>
      <div class="fc-foot">
        <div class="sr-row" onclick="event.stopPropagation()">
          <button class="sr-btn sa" onclick="rateCard(this,1,'${sj}')">🔁 Study Again</button>
          <button class="sr-btn gi" onclick="rateCard(this,4,'${sj}')">✅ Got It</button>
        </div>
      </div>
    </div></div>
  </div>`;
}

function flipCard(face) { face.closest('.fc').classList.toggle('flip'); }

function renderStats() {
  if (!filtered.length) { document.getElementById('stats-bar').innerHTML=''; return; }
  const types = {};
  filtered.forEach(c => { types[c.type]=(types[c.type]||0)+1; });
  const top = Object.entries(types).sort((a,b)=>b[1]-a[1])[0];
  document.getElementById('stats-bar').innerHTML = `
    <div class="sc">🃏 ${filtered.length} card${filtered.length!==1?'s':''}</div>
    ${top?`<div class="sc">⭐ ${top[0]}</div>`:''}
  `;
}

// ── SR (grid) ──────────────────────────────────────────────────────
async function rateCard(btn, q, sj) {
  const row = btn.closest('.sr-row');
  try {
    const tmp = document.createElement('textarea'); tmp.innerHTML = sj;
    const card = JSON.parse(tmp.value);
    const res = await fetch(`${API}/review`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({card,quality:q}) });
    const d   = await res.json();
    const iv  = d.card?.interval ?? (q>=3?3:1);
    row.innerHTML = q>=3
      ? `<div class="sr-done">✅ Got it! Review in ${iv} day${iv!==1?'s':''}</div>`
      : `<div class="sr-done">🔁 Study again in ${iv} day${iv!==1?'s':''}</div>`;
  } catch {
    row.innerHTML = q>=3 ? `<div class="sr-done">✅ Got it!</div>` : `<div class="sr-done">🔁 Study again!</div>`;
  }
}

// ── Fullscreen ─────────────────────────────────────────────────────
function openFS() {
  if (!filtered.length) return;
  fsIdx=0; fsFlipped=false; renderFSCard();
  document.getElementById('fs').classList.add('on');
  document.getElementById('btn-fs').classList.add('active');
  document.getElementById('btn-grid').classList.remove('active');
}
function closeFS() {
  document.getElementById('fs').classList.remove('on');
  document.getElementById('btn-grid').classList.add('active');
  document.getElementById('btn-fs').classList.remove('active');
}
function flipFS() {
  fsFlipped=!fsFlipped;
  document.getElementById('fs-card').classList.toggle('fl',fsFlipped);
}
function navFS(dir) {
  const n=fsIdx+dir;
  if(n<0||n>=filtered.length) return;
  fsIdx=n; fsFlipped=false;
  document.getElementById('fs-card').classList.remove('fl');
  setTimeout(renderFSCard,18);
}
function renderFSCard() {
  const c=filtered[fsIdx]; if(!c) return;
  const fc=document.getElementById('fs-card');
  fc.dataset.t=c.type||'CONCEPT';
  document.getElementById('fst-f').textContent = c.type||'';
  document.getElementById('fst-b').textContent = c.type||'';
  document.getElementById('fsq').textContent   = c.front||'';
  document.getElementById('fsa').innerHTML     = fmt(c.back||'');
  document.getElementById('fshint').textContent= c.hint?'💡 '+c.hint:'';
  document.getElementById('fs-cpt').textContent= c.concept?'Concept: '+c.concept:'';
  document.getElementById('fs-ctr').textContent= `${fsIdx+1} / ${filtered.length}`;
  document.getElementById('fs-pf').style.width = `${((fsIdx+1)/filtered.length)*100}%`;
  document.getElementById('fs-prev').disabled  = fsIdx===0;
  document.getElementById('fs-next').disabled  = fsIdx===filtered.length-1;
  const rel=(c.related_to||[]).slice(0,4);
  document.getElementById('fs-rtags').innerHTML = rel.map(r=>`<span class="fs-rtag">↗ ${H(r)}</span>`).join('');
  document.getElementById('fs-sr').innerHTML = `
    <button class="fs-sr-btn sa" onclick="rateFS(1,event)">🔁 Study Again</button>
    <button class="fs-sr-btn gi" onclick="rateFS(4,event)">✅ Got It</button>`;
}
async function rateFS(q, evt) {
  evt.stopPropagation();
  try { await fetch(`${API}/review`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({card:filtered[fsIdx],quality:q})}); } catch{}
  document.getElementById('fs-sr').innerHTML =
    q>=3?`<div class="fs-rated">✅ Got it! Moving on…</div>`:`<div class="fs-rated">🔁 Moving on…</div>`;
  setTimeout(()=>navFS(1),650);
}

// Keyboard
document.addEventListener('keydown', e => {
  if(!document.getElementById('fs').classList.contains('on')) return;
  if(e.key==='ArrowLeft') navFS(-1);
  else if(e.key==='ArrowRight') navFS(1);
  else if(e.key===' '||e.key==='Enter'){e.preventDefault();flipFS();}
  else if(e.key==='Escape') closeFS();
});
// Swipe
const fsEl=document.getElementById('fs');
fsEl.addEventListener('touchstart',e=>{swipeX=e.touches[0].clientX;},{passive:true});
fsEl.addEventListener('touchend',e=>{
  if(swipeX===null) return;
  if(Math.abs(swipeX-e.changedTouches[0].clientX)>50) navFS(swipeX>e.changedTouches[0].clientX?1:-1);
  swipeX=null;
});

// ── Utilities ──────────────────────────────────────────────────────
function setView(v){document.getElementById('btn-grid').classList.toggle('active',v==='grid');document.getElementById('btn-fs').classList.toggle('active',v==='fs');if(v==='fs')openFS();}
function toggleSB(){sbOpen=!sbOpen;document.getElementById('sb').classList.toggle('off',!sbOpen);}
function H(s){return(s||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function J(s){return JSON.stringify(s);}
function fmt(t){const s=H(t);return s.replace(/\\n•\s*/g,'<br>• ').replace(/\\n/g,'<br>').replace(/\n•\s*/g,'<br>• ').replace(/\n/g,'<br>');}
function toast(msg,err=false){const t=document.getElementById('toast');t.textContent=msg;t.className='toast'+(err?' err':'');setTimeout(()=>t.classList.add('on'),8);setTimeout(()=>t.classList.remove('on'),4000);}
</script>
</body>
